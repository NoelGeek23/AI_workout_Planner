<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Workout Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>BMI-Based Workout Planner</h1>
        <form id="workout-form">
            <label for="fitness-level">Fitness Level:</label>
            <select id="fitness-level" name="fitness-level">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>
            <label for="available-time">Available Time (minutes):</label>
            <input type="number" id="available-time" name="available-time" required>
            <button type="submit">Generate Workout Plan</button>
        </form>
        <div id="workout-plan"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
